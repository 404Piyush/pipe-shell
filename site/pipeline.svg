<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="p" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <g transform="translate(40, 100)">
    <rect width="160" height="100" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="80" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#22c55e">parent shell</text>
    <text x="80" y="68" text-anchor="middle" font-size="10" fill="#94a3b8">parse · pipe · fork · close · wait</text>
  </g>
  <g transform="translate(280, 100)">
    <rect width="100" height="60" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <text x="50" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">child 0</text>
    <text x="50" y="42" text-anchor="middle" font-size="11" fill="#94a3b8">ls /etc</text>
  </g>
  <rect x="380" y="120" width="80" height="20" rx="3" fill="url(#p)"/>
  <text x="420" y="135" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">pipe 0</text>
  <g transform="translate(460, 100)">
    <rect width="100" height="60" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <text x="50" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">child 1</text>
    <text x="50" y="42" text-anchor="middle" font-size="11" fill="#94a3b8">grep hosts</text>
  </g>
  <rect x="560" y="120" width="80" height="20" rx="3" fill="url(#p)"/>
  <text x="600" y="135" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">pipe 1</text>
  <g transform="translate(640, 100)">
    <rect width="100" height="60" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <text x="50" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">child 2</text>
    <text x="50" y="42" text-anchor="middle" font-size="11" fill="#94a3b8">wc -l</text>
  </g>
  <line x1="200" y1="120" x2="280" y2="125" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="200" y1="135" x2="280" y2="140" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="200" y1="150" x2="280" y2="155" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="240" y="105" text-anchor="middle" font-size="9" fill="#22c55e" font-weight="600">fork × 3</text>
  <text x="400" y="235" text-anchor="middle" font-size="12" font-weight="700" fill="#f8fafc">The 4 rules</text>
  <text x="400" y="260" text-anchor="middle" font-size="11" fill="#cbd5e1">1.  parent closes its copy of every pipe fd (or consumer hangs forever)</text>
  <text x="400" y="280" text-anchor="middle" font-size="11" fill="#cbd5e1">2.  child dup2's the read end to stdin, the write end to stdout</text>
  <text x="400" y="300" text-anchor="middle" font-size="11" fill="#cbd5e1">3.  child closes all fds it doesn't need before exec</text>
  <text x="400" y="320" text-anchor="middle" font-size="11" fill="#cbd5e1">4.  parent waitpid's every child (foreground) or none (background &amp;)</text>
</svg>
